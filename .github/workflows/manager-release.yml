name: manager-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked --version '^2.0.0'

      - name: Install dependencies
        run: npm ci

      - name: Preflight
        run: npm run doctor:windows

      - name: Build NSIS installer
        run: npm run tauri:build

      - name: Normalize installer asset
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter *.exe | Select-Object -First 1
          if (-not $installer) { throw "NSIS installer not found" }
          Copy-Item $installer.FullName bronzeforge-manager-windows-x64-installer.exe

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: bronzeforge-manager-windows-x64-installer.exe
